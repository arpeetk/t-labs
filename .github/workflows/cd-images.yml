name: CD — Images

# Builds and pushes container images to Artifact Registry whenever app source
# changes land on main. Only the apps that actually changed are rebuilt.

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'

permissions:
  contents: read
  id-token: write

env:
  REGISTRY: us-central1-docker.pkg.dev/t-labs-shared/t-labs

jobs:
  # ── Detect which apps changed ──────────────────────────────────────────────
  changes:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      hello-world: ${{ steps.filter.outputs.hello-world }}
      api-service: ${{ steps.filter.outputs.api-service }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            hello-world:
              - 'apps/hello-world/**'
            api-service:
              - 'apps/api-service/**'

  # ── Shared auth step (re-used by both build jobs) ──────────────────────────
  # NOTE: GitHub Actions does not support job-level output from auth — each
  # build job authenticates independently (both run only when needed).
  # Uses the ci-image-pusher SA (roles/artifactregistry.writer only), NOT the
  # Terraform SA, to limit blast radius if a build context is compromised.

  # ── hello-world ────────────────────────────────────────────────────────────
  build-hello-world:
    name: Build · push — hello-world
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.hello-world == 'true'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: google-github-actions/auth@6fc4af4b145ae7821d527454aa9bd537d1f2dc5f # v2.1.7
        id: auth
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.IMAGES_SA_EMAIL }}
          token_format: access_token

      - uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: us-central1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1

      - uses: docker/build-push-action@48aba3b46d1b1fec4febb7c5d0c644b249a11355 # v6.10.0
        with:
          context: apps/hello-world
          push: true
          tags: |
            ${{ env.REGISTRY }}/hello-world:latest
            ${{ env.REGISTRY }}/hello-world:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── api-service ────────────────────────────────────────────────────────────
  build-api-service:
    name: Build · push — api-service
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.api-service == 'true'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: google-github-actions/auth@6fc4af4b145ae7821d527454aa9bd537d1f2dc5f # v2.1.7
        id: auth
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.IMAGES_SA_EMAIL }}
          token_format: access_token

      - uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: us-central1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1

      - uses: docker/build-push-action@48aba3b46d1b1fec4febb7c5d0c644b249a11355 # v6.10.0
        with:
          context: apps/api-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/api-service:latest
            ${{ env.REGISTRY }}/api-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to dev ──────────────────────────────────────────────────────────
  # Runs after whichever build jobs completed successfully. Uses the
  # terraform-dev SA (has container.admin + iam.serviceAccountAdmin) to build
  # and run the tld CLI, which handles namespace, GSA, WI binding, and rollout.
  deploy-dev:
    name: Deploy — dev
    runs-on: ubuntu-latest
    needs: [build-hello-world, build-api-service]
    if: |
      always() &&
      (needs.build-hello-world.result == 'success' ||
       needs.build-api-service.result == 'success')
    environment: dev-apps
    env:
      TLD_DEV_PROJECT: t-labs-dev-2
      USE_GKE_GCLOUD_AUTH_PLUGIN: "True"

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - name: Build tld CLI
        run: cd cli && go build -o /usr/local/bin/tld .

      - uses: google-github-actions/auth@6fc4af4b145ae7821d527454aa9bd537d1f2dc5f # v2.1.7
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.TF_SA_EMAIL_DEV }}

      - name: Install gke-gcloud-auth-plugin
        run: sudo apt-get install -y google-cloud-sdk-gke-gcloud-auth-plugin

      - name: Deploy hello-world
        if: needs.build-hello-world.result == 'success'
        run: tld deploy -f apps/hello-world/deploy.yaml

      - name: Deploy api-service
        if: needs.build-api-service.result == 'success'
        run: tld deploy -f apps/api-service/deploy.yaml
