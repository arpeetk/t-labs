name: CD — Images

# Builds and pushes container images to Artifact Registry whenever app source
# changes land on main. Only the apps that actually changed are rebuilt.

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'

permissions:
  contents: read
  id-token: write

env:
  REGISTRY: us-central1-docker.pkg.dev/t-labs-shared/t-labs

jobs:
  # ── Detect which apps changed ──────────────────────────────────────────────
  changes:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      hello-world: ${{ steps.filter.outputs.hello-world }}
      api-service: ${{ steps.filter.outputs.api-service }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            hello-world:
              - 'apps/hello-world/**'
            api-service:
              - 'apps/api-service/**'

  # ── Shared auth step (re-used by both build jobs) ──────────────────────────
  # NOTE: GitHub Actions does not support job-level output from auth — each
  # build job authenticates independently (both run only when needed).
  # Uses the ci-image-pusher SA (roles/artifactregistry.writer only), NOT the
  # Terraform SA, to limit blast radius if a build context is compromised.

  # ── hello-world ────────────────────────────────────────────────────────────
  build-hello-world:
    name: Build · push — hello-world
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.hello-world == 'true'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        id: auth
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.IMAGES_SA_EMAIL }}
          token_format: access_token

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: us-central1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: apps/hello-world
          push: true
          tags: |
            ${{ env.REGISTRY }}/hello-world:latest
            ${{ env.REGISTRY }}/hello-world:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── api-service ────────────────────────────────────────────────────────────
  build-api-service:
    name: Build · push — api-service
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.api-service == 'true'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        id: auth
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.IMAGES_SA_EMAIL }}
          token_format: access_token

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: us-central1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: apps/api-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/api-service:latest
            ${{ env.REGISTRY }}/api-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to dev ──────────────────────────────────────────────────────────
  # Runs after whichever build jobs completed successfully. Uses the
  # terraform-dev SA (has container.admin + iam.serviceAccountAdmin) to build
  # and run the tld CLI, which handles namespace, GSA, WI binding, and rollout.
  deploy-dev:
    name: Deploy — dev
    runs-on: ubuntu-latest
    needs: [build-hello-world, build-api-service]
    if: |
      always() &&
      (needs.build-hello-world.result == 'success' ||
       needs.build-api-service.result == 'success')
    environment: dev-apps
    env:
      TLD_DEV_PROJECT: t-labs-dev-2
      TLD_CLUSTER: t-labs-dev-gke
      TLD_REGION: us-central1

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - name: Build tld CLI
        run: cd cli && go build -o /usr/local/bin/tld .

      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.TF_SA_EMAIL_DEV }}

      - name: Install gke-gcloud-auth-plugin
        run: |
          curl -fsSL https://packages.cloud.google.com/apt/doc/apt-key.gpg \
            | sudo gpg --dearmor -o /usr/share/keyrings/cloud.google.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] \
            https://packages.cloud.google.com/apt cloud-sdk main" \
            | sudo tee /etc/apt/sources.list.d/google-cloud-sdk.list
          sudo apt-get update -qq
          sudo apt-get install -y google-cloud-cli-gke-gcloud-auth-plugin

      - name: Authorize runner IP on GKE control plane
        run: |
          RUNNER_IP=$(curl -sf https://ifconfig.me)/32
          CURRENT=$(gcloud container clusters describe "$TLD_CLUSTER" \
            --region "$TLD_REGION" --project "$TLD_DEV_PROJECT" \
            --format=json \
            | jq -r '[.masterAuthorizedNetworksConfig.cidrBlocks[].cidrBlock] | join(",")')
          gcloud container clusters update "$TLD_CLUSTER" \
            --region "$TLD_REGION" --project "$TLD_DEV_PROJECT" \
            --enable-master-authorized-networks \
            --master-authorized-networks "${CURRENT:+$CURRENT,}${RUNNER_IP}"
          echo "Waiting 30s for authorized networks to propagate..."
          sleep 30

      - name: Deploy hello-world
        if: needs.build-hello-world.result == 'success'
        run: tld deploy -f apps/hello-world/deploy.yaml

      - name: Deploy api-service
        if: needs.build-api-service.result == 'success'
        run: tld deploy -f apps/api-service/deploy.yaml

      - name: Revoke runner IP from GKE control plane
        if: always()
        run: |
          RUNNER_IP=$(curl -sf https://ifconfig.me)/32
          CURRENT=$(gcloud container clusters describe "$TLD_CLUSTER" \
            --region "$TLD_REGION" --project "$TLD_DEV_PROJECT" \
            --format=json \
            | jq -r '[.masterAuthorizedNetworksConfig.cidrBlocks[].cidrBlock] | join(",")')
          FILTERED=$(printf '%s' "$CURRENT" | tr ',' '\n' \
            | grep -v "^${RUNNER_IP}$" | paste -sd,)
          gcloud container clusters update "$TLD_CLUSTER" \
            --region "$TLD_REGION" --project "$TLD_DEV_PROJECT" \
            --enable-master-authorized-networks \
            --master-authorized-networks "$FILTERED"
