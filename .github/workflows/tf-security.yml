name: TF Security

# Static analysis for Terraform: tflint + trivy (covers tfsec checks since
# trivy absorbed tfsec). Runs on every PR and on push to main so security
# regressions block merges and historical baselines are recorded.

on:
  pull_request:
    branches: [main]
    paths:
      - 'bootstrap/**'
      - 'modules/**'
      - 'environments/**'
      - '.github/workflows/tf-security.yml'
  push:
    branches: [main]
    paths:
      - 'bootstrap/**'
      - 'modules/**'
      - 'environments/**'

permissions:
  contents: read
  security-events: write   # for uploading SARIF results to the Security tab
  pull-requests: write     # tflint annotations

jobs:
  tflint:
    name: tflint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir:
          - bootstrap
          - modules/vpc
          - modules/gke
          - modules/cloudsql
          - environments/dev
          - environments/stage
          - environments/prod
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93 # v6.2.2
        with:
          tflint_version: v0.54.0

      - run: tflint --init
        working-directory: ${{ matrix.dir }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: tflint --format compact
        working-directory: ${{ matrix.dir }}

  trivy:
    name: trivy (config scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq && sudo apt-get install -y trivy

      - name: Trivy config scan
        # Skip app manifests — they describe workloads the tld CLI manages at
        # runtime, not infrastructure this repo applies.
        run: |
          trivy config . \
            --format sarif \
            --output trivy-results.sarif \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --skip-dirs apps \
            --skip-dirs cli

      - name: Upload SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4.36.1
        with:
          sarif_file: trivy-results.sarif
          category: trivy-config
