name: TF Security

# Static analysis for Terraform: tflint + trivy (covers tfsec checks since
# trivy absorbed tfsec). Runs on every PR and on push to main so security
# regressions block merges and historical baselines are recorded.

on:
  pull_request:
    branches: [main]
    paths:
      - 'bootstrap/**'
      - 'modules/**'
      - 'environments/**'
      - '.github/workflows/tf-security.yml'
  push:
    branches: [main]
    paths:
      - 'bootstrap/**'
      - 'modules/**'
      - 'environments/**'

permissions:
  contents: read
  security-events: write   # for uploading SARIF results to the Security tab
  pull-requests: write     # tflint annotations

jobs:
  tflint:
    name: tflint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir:
          - bootstrap
          - modules/vpc
          - modules/gke
          - modules/cloudsql
          - environments/dev
          - environments/stage
          - environments/prod
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: terraform-linters/setup-tflint@90f302c255ef959cbfb4bd10581afecdb7ece3e6 # v4.1.1
        with:
          tflint_version: v0.54.0

      - run: tflint --init
        working-directory: ${{ matrix.dir }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: tflint --format compact
        working-directory: ${{ matrix.dir }}

  trivy:
    name: trivy (config scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947b394f2dd8c87dbb0 # 0.29.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          # Keep the gate strict: a HIGH finding fails the build.
          exit-code: '1'
          # Skip the example deploy.yaml manifests — they describe deployments
          # the tld CLI manages at runtime, not infrastructure the repo applies.
          skip-dirs: 'apps,cli'

      - name: Upload SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@f09c1c0a94de965c15400f5634aa42fac8fb8f88 # v3.27.5
        with:
          sarif_file: trivy-results.sarif
          category: trivy-config
