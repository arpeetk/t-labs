name: CD — Terraform

# Applies Terraform automatically for dev on every merge to main when
# dev or shared module files change. Stage and prod require a manual
# workflow dispatch so that applies are always intentional and reviewed.

on:
  push:
    branches: [main]
    paths:
      - 'modules/**'
      - 'environments/dev/**'
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to apply
        required: true
        type: choice
        options: [dev, stage, prod]

permissions:
  contents: read
  id-token: write

env:
  TF_VERSION: "~> 1.8"

jobs:
  # ── Dev: auto-apply on every merge ────────────────────────────────────────
  apply-dev:
    name: Apply — dev
    runs-on: ubuntu-latest
    environment: dev
    concurrency:
      group: terraform-apply-dev
      cancel-in-progress: false
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    defaults:
      run:
        working-directory: environments/dev
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        id: auth
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.TF_SA_EMAIL }}
          token_format: access_token

      - name: Export SA token for Terraform
        env:
          ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          echo "::add-mask::${ACCESS_TOKEN}"
          echo "GOOGLE_OAUTH_ACCESS_TOKEN=${ACCESS_TOKEN}" >> "$GITHUB_ENV"
          printf 'GOOGLE_CLOUD_PROJECT=\nCLOUDSDK_CORE_PROJECT=\nCLOUDSDK_PROJECT=\nGCLOUD_PROJECT=\nGCP_PROJECT=\n' >> "$GITHUB_ENV"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - run: terraform init -backend-config="bucket=t-labs-state-dev"
      - run: terraform plan -out=tfplan -no-color
      - run: terraform apply tfplan

  # ── Stage: manual dispatch only — requires GitHub environment protection ───
  apply-stage:
    name: Apply — stage
    runs-on: ubuntu-latest
    environment: stage   # configure required reviewers in GitHub repo settings
    concurrency:
      group: terraform-apply-stage
      cancel-in-progress: false
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'stage'
    defaults:
      run:
        working-directory: environments/stage
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        id: auth
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.TF_SA_EMAIL }}
          token_format: access_token

      - name: Export SA token for Terraform
        env:
          ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          echo "::add-mask::${ACCESS_TOKEN}"
          echo "GOOGLE_OAUTH_ACCESS_TOKEN=${ACCESS_TOKEN}" >> "$GITHUB_ENV"
          printf 'GOOGLE_CLOUD_PROJECT=\nCLOUDSDK_CORE_PROJECT=\nCLOUDSDK_PROJECT=\nGCLOUD_PROJECT=\nGCP_PROJECT=\n' >> "$GITHUB_ENV"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - run: terraform init -backend-config="bucket=t-labs-state-stage"
      - run: terraform plan -out=tfplan -no-color
      - run: terraform apply tfplan

  # ── Prod: manual dispatch only — requires GitHub environment protection ─────
  apply-prod:
    name: Apply — prod
    runs-on: ubuntu-latest
    environment: prod    # configure required reviewers + deployment branches in GitHub repo settings
    concurrency:
      group: terraform-apply-prod
      cancel-in-progress: false
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod'
    defaults:
      run:
        working-directory: environments/prod
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        id: auth
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.TF_SA_EMAIL }}
          token_format: access_token

      - name: Export SA token for Terraform
        env:
          ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          echo "::add-mask::${ACCESS_TOKEN}"
          echo "GOOGLE_OAUTH_ACCESS_TOKEN=${ACCESS_TOKEN}" >> "$GITHUB_ENV"
          printf 'GOOGLE_CLOUD_PROJECT=\nCLOUDSDK_CORE_PROJECT=\nCLOUDSDK_PROJECT=\nGCLOUD_PROJECT=\nGCP_PROJECT=\n' >> "$GITHUB_ENV"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - run: terraform init -backend-config="bucket=t-labs-state-prod"
      - run: terraform plan -out=tfplan -no-color
      - run: terraform apply tfplan
