name: CD — Terraform

# Plan-then-apply for each environment.
#
# Plan jobs use the GitHub environment "<env>-plan" which carries NO required
# reviewers; they run immediately and publish their tfplan artifact + a
# human-readable summary to the workflow run.
#
# Apply jobs use the GitHub environment "<env>" which carries required
# reviewers (configured in repo settings). The approver reads the plan job's
# summary, then approves the apply. apply downloads the same tfplan artifact
# the plan job produced, so the executed change cannot drift from the reviewed
# plan even if main moves in between.
#
# WIF principal bindings (bootstrap/github_actions.tf) limit terraform-<env>
# SAs to jobs that opt into the matching <env> or <env>-plan environments.

on:
  push:
    branches: [main]
    paths:
      - 'modules/**'
      - 'environments/dev/**'
      - 'bootstrap/github_actions.tf'   # WIF changes need a dev plan rerun
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to apply
        required: true
        type: choice
        options: [dev, stage, prod]

permissions:
  contents: read
  id-token: write

env:
  TF_VERSION: "~> 1.8"

jobs:
  # ── dev ────────────────────────────────────────────────────────────────────
  plan-dev:
    name: Plan — dev
    runs-on: ubuntu-latest
    environment: dev-plan
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    defaults:
      run:
        working-directory: environments/dev
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        id: auth
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.TF_SA_EMAIL_DEV }}
          token_format: access_token

      - name: Export SA token for Terraform
        env:
          ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          echo "::add-mask::${ACCESS_TOKEN}"
          echo "GOOGLE_OAUTH_ACCESS_TOKEN=${ACCESS_TOKEN}" >> "$GITHUB_ENV"
          printf 'GOOGLE_CLOUD_PROJECT=\nCLOUDSDK_CORE_PROJECT=\nCLOUDSDK_PROJECT=\nGCLOUD_PROJECT=\nGCP_PROJECT=\n' >> "$GITHUB_ENV"

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - run: terraform init -backend-config="bucket=t-labs-state-dev"
      - name: Plan
        run: |
          terraform plan -out=tfplan -no-color | tee plan.txt
      - name: Render plan to job summary
        run: |
          {
            echo '### Terraform plan — dev'
            echo
            echo '```hcl'
            head -c 60000 plan.txt
            echo
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload tfplan artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tfplan-dev
          path: |
            environments/dev/tfplan
            environments/dev/plan.txt
          retention-days: 7

  apply-dev:
    name: Apply — dev
    needs: plan-dev
    runs-on: ubuntu-latest
    environment: dev
    concurrency:
      group: terraform-apply-dev
      cancel-in-progress: false
    defaults:
      run:
        working-directory: environments/dev
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        id: auth
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.TF_SA_EMAIL_DEV }}
          token_format: access_token

      - name: Export SA token for Terraform
        env:
          ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          echo "::add-mask::${ACCESS_TOKEN}"
          echo "GOOGLE_OAUTH_ACCESS_TOKEN=${ACCESS_TOKEN}" >> "$GITHUB_ENV"
          printf 'GOOGLE_CLOUD_PROJECT=\nCLOUDSDK_CORE_PROJECT=\nCLOUDSDK_PROJECT=\nGCLOUD_PROJECT=\nGCP_PROJECT=\n' >> "$GITHUB_ENV"

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Download tfplan
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: tfplan-dev
          path: environments/dev

      - run: terraform init -backend-config="bucket=t-labs-state-dev"
      - run: terraform apply tfplan

  # ── stage ──────────────────────────────────────────────────────────────────
  plan-stage:
    name: Plan — stage
    runs-on: ubuntu-latest
    environment: stage-plan
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'stage'
    defaults:
      run:
        working-directory: environments/stage
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        id: auth
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.TF_SA_EMAIL_STAGE }}
          token_format: access_token

      - name: Export SA token for Terraform
        env:
          ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          echo "::add-mask::${ACCESS_TOKEN}"
          echo "GOOGLE_OAUTH_ACCESS_TOKEN=${ACCESS_TOKEN}" >> "$GITHUB_ENV"
          printf 'GOOGLE_CLOUD_PROJECT=\nCLOUDSDK_CORE_PROJECT=\nCLOUDSDK_PROJECT=\nGCLOUD_PROJECT=\nGCP_PROJECT=\n' >> "$GITHUB_ENV"

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - run: terraform init -backend-config="bucket=t-labs-state-stage"
      - name: Plan
        run: terraform plan -out=tfplan -no-color | tee plan.txt
      - name: Render plan to job summary
        run: |
          {
            echo '### Terraform plan — stage'
            echo
            echo '```hcl'
            head -c 60000 plan.txt
            echo
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tfplan-stage
          path: |
            environments/stage/tfplan
            environments/stage/plan.txt
          retention-days: 7

  apply-stage:
    name: Apply — stage
    needs: plan-stage
    runs-on: ubuntu-latest
    environment: stage
    concurrency:
      group: terraform-apply-stage
      cancel-in-progress: false
    defaults:
      run:
        working-directory: environments/stage
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        id: auth
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.TF_SA_EMAIL_STAGE }}
          token_format: access_token

      - name: Export SA token for Terraform
        env:
          ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          echo "::add-mask::${ACCESS_TOKEN}"
          echo "GOOGLE_OAUTH_ACCESS_TOKEN=${ACCESS_TOKEN}" >> "$GITHUB_ENV"
          printf 'GOOGLE_CLOUD_PROJECT=\nCLOUDSDK_CORE_PROJECT=\nCLOUDSDK_PROJECT=\nGCLOUD_PROJECT=\nGCP_PROJECT=\n' >> "$GITHUB_ENV"

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: tfplan-stage
          path: environments/stage

      - run: terraform init -backend-config="bucket=t-labs-state-stage"
      - run: terraform apply tfplan

  # ── prod ───────────────────────────────────────────────────────────────────
  plan-prod:
    name: Plan — prod
    runs-on: ubuntu-latest
    environment: prod-plan
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod'
    defaults:
      run:
        working-directory: environments/prod
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        id: auth
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.TF_SA_EMAIL_PROD }}
          token_format: access_token

      - name: Export SA token for Terraform
        env:
          ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          echo "::add-mask::${ACCESS_TOKEN}"
          echo "GOOGLE_OAUTH_ACCESS_TOKEN=${ACCESS_TOKEN}" >> "$GITHUB_ENV"
          printf 'GOOGLE_CLOUD_PROJECT=\nCLOUDSDK_CORE_PROJECT=\nCLOUDSDK_PROJECT=\nGCLOUD_PROJECT=\nGCP_PROJECT=\n' >> "$GITHUB_ENV"

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - run: terraform init -backend-config="bucket=t-labs-state-prod"
      - name: Plan
        run: terraform plan -out=tfplan -no-color | tee plan.txt
      - name: Render plan to job summary
        run: |
          {
            echo '### Terraform plan — prod'
            echo
            echo '```hcl'
            head -c 60000 plan.txt
            echo
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tfplan-prod
          path: |
            environments/prod/tfplan
            environments/prod/plan.txt
          retention-days: 7

  apply-prod:
    name: Apply — prod
    needs: plan-prod
    runs-on: ubuntu-latest
    environment: prod
    concurrency:
      group: terraform-apply-prod
      cancel-in-progress: false
    defaults:
      run:
        working-directory: environments/prod
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        id: auth
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.TF_SA_EMAIL_PROD }}
          token_format: access_token

      - name: Export SA token for Terraform
        env:
          ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          echo "::add-mask::${ACCESS_TOKEN}"
          echo "GOOGLE_OAUTH_ACCESS_TOKEN=${ACCESS_TOKEN}" >> "$GITHUB_ENV"
          printf 'GOOGLE_CLOUD_PROJECT=\nCLOUDSDK_CORE_PROJECT=\nCLOUDSDK_PROJECT=\nGCLOUD_PROJECT=\nGCP_PROJECT=\n' >> "$GITHUB_ENV"

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: tfplan-prod
          path: environments/prod

      - run: terraform init -backend-config="bucket=t-labs-state-prod"
      - run: terraform apply tfplan
