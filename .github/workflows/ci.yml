name: CI

on:
  pull_request:
    branches: [main]

# Workflow-level: read-only. pull-requests: write is scoped to tf-plan only.
permissions:
  contents: read
  id-token: write      # WIF token exchange

env:
  TF_VERSION: "~> 1.8"
  REGISTRY: us-central1-docker.pkg.dev/t-labs-shared/t-labs

jobs:
  # ── CLI: build · vet · test ────────────────────────────────────────────────
  cli:
    name: CLI — build · vet · test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - run: go build ./...
      - run: go vet ./...
      - run: go test ./pkg/... -v -count=1

  # ── Terraform: format check ────────────────────────────────────────────────
  tf-fmt:
    name: Terraform — fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Check formatting
        run: terraform fmt -check -recursive

  # ── Terraform: validate all environments ───────────────────────────────────
  tf-validate:
    name: Terraform — validate ${{ matrix.env }}
    runs-on: ubuntu-latest
    needs: tf-fmt
    strategy:
      fail-fast: false
      matrix:
        env: [dev, stage, prod]
    defaults:
      run:
        working-directory: environments/${{ matrix.env }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Init (no backend — providers only)
        run: terraform init -backend=false

      - name: Validate
        run: terraform validate

  # ── Terraform: plan dev and post as PR comment ─────────────────────────────
  tf-plan:
    name: Terraform — plan dev
    runs-on: ubuntu-latest
    needs: tf-validate
    environment: dev
    # Narrowed permission: only this job needs to write PR comments.
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    defaults:
      run:
        working-directory: environments/dev
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: google-github-actions/auth@6fc4af4b145ae7821d527454aa9bd537d1f2dc5f # v2.1.7
        id: auth
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.TF_SA_EMAIL }}
          token_format: access_token

      - name: Export SA token for Terraform
        env:
          ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          echo "::add-mask::${ACCESS_TOKEN}"
          echo "GOOGLE_OAUTH_ACCESS_TOKEN=${ACCESS_TOKEN}" >> "$GITHUB_ENV"
          printf 'GOOGLE_CLOUD_PROJECT=\nCLOUDSDK_CORE_PROJECT=\nCLOUDSDK_PROJECT=\nGCLOUD_PROJECT=\nGCP_PROJECT=\n' >> "$GITHUB_ENV"

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Init
        run: terraform init -backend-config="bucket=t-labs-state-dev"

      - name: Plan
        id: plan
        run: |
          set +e
          terraform plan -no-color 2>&1 | tee plan.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Post plan as PR comment
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        env:
          PLAN_FILE: ${{ github.workspace }}/environments/dev/plan.txt
          PLAN_EXIT_CODE: ${{ steps.plan.outputs.exit_code }}
        with:
          script: |
            const fs = require('fs');
            const raw  = fs.readFileSync(process.env.PLAN_FILE, 'utf8');
            const plan = raw.length > 60000 ? raw.slice(0, 60000) + '\n…(truncated)' : raw;
            const status = process.env.PLAN_EXIT_CODE === '0' ? '✅' : '❌';
            const body = [
              `### ${status} Terraform Plan — dev`,
              '<details><summary>Show plan output</summary>',
              '',
              '```hcl',
              plan,
              '```',
              '</details>',
            ].join('\n');

            // Replace previous bot plan comment if present (fetch up to 100 to handle busy PRs).
            const existing = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            for (const c of existing.data) {
              if (c.user.type === 'Bot' && c.body.includes('Terraform Plan — dev')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  comment_id: c.id,
                });
              }
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail if plan errored
        if: steps.plan.outputs.exit_code != '0'
        run: exit 1
