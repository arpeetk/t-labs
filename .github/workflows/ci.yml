name: CI

# PR-time gates: CLI build/vet/test, Terraform fmt/validate across all envs,
# and a Terraform plan on dev. The plan job impersonates a read-only SA
# (terraform-plan-ro) so a malicious PR cannot mutate any environment, even
# after the WIF exchange.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  TF_VERSION: "~> 1.8"
  REGISTRY: us-central1-docker.pkg.dev/t-labs-shared/t-labs

jobs:
  # ── CLI: build · vet · test ────────────────────────────────────────────────
  cli:
    name: CLI — build · vet · test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - run: go build ./...
      - run: go vet ./...
      - run: go test ./pkg/... -v -count=1

  # ── Terraform: format check ────────────────────────────────────────────────
  tf-fmt:
    name: Terraform — fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Check formatting
        run: terraform fmt -check -recursive

  # ── Terraform: validate all environments ───────────────────────────────────
  tf-validate:
    name: Terraform — validate ${{ matrix.env }}
    runs-on: ubuntu-latest
    needs: tf-fmt
    strategy:
      fail-fast: false
      matrix:
        env: [dev, stage, prod]
    defaults:
      run:
        working-directory: environments/${{ matrix.env }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Init (no backend — providers only)
        run: terraform init -backend=false

      - name: Validate
        run: terraform validate

  # ── Terraform: plan dev and post as PR comment ─────────────────────────────
  # Uses the dedicated read-only plan SA. WIF principal binding is tied to
  # pull_request events, so a malicious push or workflow_dispatch cannot use it.
  tf-plan:
    name: Terraform — plan dev
    runs-on: ubuntu-latest
    needs: tf-validate
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    defaults:
      run:
        working-directory: environments/dev
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        id: auth
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.TF_SA_EMAIL_PLAN }}
          token_format: access_token

      - name: Export SA token for Terraform
        env:
          ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          echo "::add-mask::${ACCESS_TOKEN}"
          echo "GOOGLE_OAUTH_ACCESS_TOKEN=${ACCESS_TOKEN}" >> "$GITHUB_ENV"
          printf 'GOOGLE_CLOUD_PROJECT=\nCLOUDSDK_CORE_PROJECT=\nCLOUDSDK_PROJECT=\nGCLOUD_PROJECT=\nGCP_PROJECT=\n' >> "$GITHUB_ENV"

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Init
        run: terraform init -backend-config="bucket=t-labs-state-dev"

      - name: Plan
        id: plan
        run: |
          set +e
          terraform plan -lock=false -no-color 2>&1 | tee plan.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Post plan as PR comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          PLAN_FILE: ${{ github.workspace }}/environments/dev/plan.txt
          PLAN_EXIT_CODE: ${{ steps.plan.outputs.exit_code }}
        with:
          script: |
            const fs = require('fs');
            const raw  = fs.readFileSync(process.env.PLAN_FILE, 'utf8');
            const plan = raw.length > 60000 ? raw.slice(0, 60000) + '\n…(truncated)' : raw;
            const status = process.env.PLAN_EXIT_CODE === '0' ? '✅' : '❌';
            const body = [
              `### ${status} Terraform Plan — dev`,
              '<details><summary>Show plan output</summary>',
              '',
              '```hcl',
              plan,
              '```',
              '</details>',
            ].join('\n');

            const existing = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            for (const c of existing.data) {
              if (c.user.type === 'Bot' && c.body.includes('Terraform Plan — dev')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  comment_id: c.id,
                });
              }
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail if plan errored
        if: steps.plan.outputs.exit_code != '0'
        run: exit 1
