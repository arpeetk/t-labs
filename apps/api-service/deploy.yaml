# tl deployer manifest — api-service
# Private backend service. Connects to Cloud SQL over its private IP, with
# host/port/db_name/db_user supplied via a Secret Manager JSON blob written by
# modules/cloudsql — no IPs hardcoded here.
name: api-service
environment: dev

image: us-central1-docker.pkg.dev/t-labs-shared/t-labs/api-service:latest
replicas: 2

resources:
  cpu: "250m"
  memory: "256Mi"

service:
  type: private # ClusterIP — internal only, called by other services
  port: 8080

health:
  path: /health
  port: 8080

env:
  - name: PORT
    value: "8080"

secrets:
  - envVar: DB_CONNECTION
    secret: t-labs-dev-db-connection
  - envVar: DB_PASSWORD
    secret: t-labs-dev-db-password

iam:
  roles:
    - roles/secretmanager.secretAccessor
