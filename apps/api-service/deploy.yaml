# tl deployer manifest — api-service
# Private backend service with Cloud SQL (direct private IP) and Secret Manager.
# DB_HOST: get the value from `terraform output cloudsql_private_ip` in environments/dev/
name: api-service
environment: dev

image: us-central1-docker.pkg.dev/t-labs-shared/t-labs/api-service:latest
replicas: 2

resources:
  cpu: "250m"
  memory: "256Mi"

service:
  type: private   # ClusterIP — internal only, called by other services
  port: 8080

env:
  - name: PORT
    value: "8080"
  - name: DB_USER
    value: "appuser"
  - name: DB_NAME
    value: "appdb"
  - name: DB_HOST
    value: "10.241.220.2"  # terraform output cloudsql_private_ip (environments/dev/)

secrets:
  - envVar: DB_PASSWORD
    secret: t-labs-dev-db-password

iam:
  roles:
    - roles/secretmanager.secretAccessor
